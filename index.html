<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Perfil do GitHub</title>
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    <script>
        let savedTheme = null;
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        try {
            savedTheme = localStorage.getItem('theme');
        } catch (error) {
            savedTheme = null;
        }

        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.dataset.theme = 'dark';
        }
    </script>

    <link rel="stylesheet" href="src/css/reset.css">
    <link rel="stylesheet" href="src/css/styles.css">
    <link rel="stylesheet" href="src/css/animations.css">
    <link rel="stylesheet" href="src/css/responsive.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.14.0/devicon.min.css">
</head>

<body>
    <main>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Alternar entre tema claro e escuro" aria-pressed="false">
            <span class="theme-toggle__label theme-toggle__label--light">Claro</span>
            <span class="theme-toggle__icon" aria-hidden="true"></span>
            <span class="theme-toggle__label theme-toggle__label--dark">Escuro</span>
        </button>

        <i class="devicon-github-original"></i>

        <section class="container">
            <header>
                <h2>Buscar Usuário</h2>
                <p class="search-hint">Digite o nome de usuário do GitHub e tenha acesso aos dados do perfil</p>
                <input type="text" id="input-search" placeholder="Digite o nome do usuário no GitHub">

                <input type="button" value="Buscar" id="btn-search">
            </header>

            <div class="profile-results"></div>
        </section>
    </main>

    <script type="module" src="src/js/index.js"></script>
</body>

</html>
